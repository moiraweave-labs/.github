name: New step proposal
description: Request a new MoiraWeave step.
title: "new-step: "
labels: [new-step]
body:
  - type: input
    id: step_name
    attributes:
      label: Step name
      placeholder: vision-clip
    validations:
      required: true

  - type: input
    id: base_model
    attributes:
      label: Base model or backend
      placeholder: Qdrant/resnet50-onnx, whisper-large-v3, vLLM, custom
    validations:
      required: true

  - type: textarea
    id: schema
    attributes:
      label: Input/output schema
      description: Include tensor names, datatypes, and shapes.
      placeholder: |
        inputs:
          - name: image_url
            datatype: BYTES
            shape: [1]
        outputs:
          - name: vector
            datatype: FP32
            shape: [-1]
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Primary use case
      placeholder: What pipeline will consume this step?
    validations:
      required: true
